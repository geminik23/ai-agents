name: MultiToolAgent
version: "1.0.0"
description: "All built-in tools enabled — the LLM picks the right tool for each task"

# NOTE: Do NOT list tool names or descriptions here.
# The framework auto-injects all tool names, descriptions, and argument schemas
# into the prompt at runtime via generate_tools_prompt().
system_prompt: |
  You are a versatile assistant.
  Always use the appropriate tool — never guess at computations, string lengths, or time values.
  You can chain multiple tool calls in a single turn when needed.
  Only make HTTP requests to URLs the user provides or obviously safe public APIs.

llm:
  provider: openai
  model: gpt-4.1-mini

tools:
  - name: calculator
  - name: datetime
  - name: text
  - name: json
  - name: math
  - name: random
  - name: file
  - name: template
  - name: http
  - name: echo

parallel_tools:
  enabled: true
  max_parallel: 3

memory:
  type: in-memory
  max_messages: 100

metadata:
  cli:
    welcome: "=== Multi-Tool Agent Demo ==="
    hints:
      - "Try: What is 2^16 and what time is it? (parallel tool calls)"
      - "Try: What is 123 * 456, what time is it, and how long is 'hello world'? (three parallel calls)"
      - "Try: How many characters in '안녕하세요'?"
      - "Try: What is the average of 10, 20, 30, 40, 50?"
      - "Try: Generate a UUID"
      - "Try: Fetch https://httpbin.org/uuid"
    show_tools: true
