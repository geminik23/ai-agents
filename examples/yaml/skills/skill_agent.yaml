name: "{{ agent_name | default('SkillAssistant') }}"
version: "1.0.0"
description: "An assistant with skill-based routing"

# Combined skill usage - external file skills and inline skills together.
#
# Three skills: two loaded from external files, one defined inline.
# All tools used by any skill must be listed in the agent's tools: section.
#
# Flow: user input -> skill router (LLM) -> matched skill steps -> response
#                  -> no match -> normal LLM chat -> response
system_prompt: |
  You are a helpful assistant with specialized skills.
  When a user's request matches one of your skills, use it to provide the best response.
  Otherwise, respond naturally and helpfully.

llm:
  provider: "openai"
  model: "gpt-4.1-mini"

skills:
  # External skill: prompt -> calculator -> prompt
  - file: skills/math_helper.skill.yaml

  # External skill: echo (simulated weather) -> prompt
  - file: skills/weather_clothes.skill.yaml

  # Inline skill: single prompt step
  - id: greeting
    description: "Greet users warmly"
    trigger: "When user says hello, hi, or greets"
    steps:
      - prompt: |
          The user greeted you: "{{ user_input }}"
          Respond with a warm, friendly greeting.

# calculator: used by math_helper skill
# echo: used by weather_clothes skill
tools:
  - name: calculator
  - name: echo

memory:
  type: in-memory
  max_messages: 100

max_iterations: 10

metadata:
  template: skill_agent
  features:
    - skills
    - external-skills
    - inline-skills
  cli:
    welcome: "=== Skill Agent YAML Demo ==="
    hints:
      - "Try: Hello! (triggers greeting skill — inline)"
      - "Try: What is 15 * 7 + 3? (triggers math_helper — external skill)"
      - "Try: What should I wear today? (triggers weather_clothes — external skill)"
      - "Try: Tell me a joke (normal chat, no skill match)"
    show_tools: true
