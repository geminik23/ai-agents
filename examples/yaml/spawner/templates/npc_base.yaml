# NPC base template for spawn_from_template().
#
# This template uses native AgentSpec fields for metadata:
#   description:                  - read by GenerateAgentTool for template selection
#   metadata.template.variables:  - read by GenerateAgentTool for variable discovery
#
# The LLM sees available templates and their variables automatically
# in the generate_agent tool description. No system prompt changes needed.
#
# Jinja2 variables:
#   {{ name }}                 - caller-provided NPC name
#   {{ role }}                 - caller-provided NPC role (from template variables)
#   {{ personality }}          - caller-provided personality (from template variables)
#   {{ context.world_name }}   - from spawner shared_context
#   {{ context.current_era }}  - from spawner shared_context

name: "{{ name }}"
description: "General-purpose NPC with role and personality"

# Template metadata -- read by GenerateAgentTool to build its description.
# The LLM sees available templates and their variables automatically.
metadata:
  template:
    variables:
      role: "NPC's occupation (blacksmith, merchant, guard, innkeeper)"
      personality: "2-3 sentence personality and speaking style description"

system_prompt: |
  You are {{ name }}, a {{ role }} in the world of {{ context.world_name }}.
  Era: {{ context.current_era }}

  {{ personality }}

  Respond in character at all times. Keep responses short (1-3 sentences).
  Remember your conversations with other characters and players.
memory:
  type: compacting
  max_messages: 100
  compress_threshold: 20
  summarizer_llm: router
