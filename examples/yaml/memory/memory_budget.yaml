name: BudgetMemoryAgent
version: "1.0.0"
description: "Compacting memory with token budgeting for prompt size control"

system_prompt: "You are a helpful assistant."

llms:
  default:
    provider: openai
    model: gpt-4.1-mini
  router:
    provider: openai
    model: gpt-4.1-nano

llm:
  default: default
  router: router

memory:
  type: compacting
  max_recent_messages: 8
  compress_threshold: 8
  summarize_batch_size: 4
  summarizer_llm: router
  token_budget:
    total: 4096                        # max tokens memory can contribute to the prompt
    allocation:
      summary: 1024                    # tokens reserved for the rolling summary
      recent_messages: 2048            # tokens reserved for recent unsummarized messages
      facts: 512                       # tokens reserved for extracted key facts
    overflow_strategy: truncate_oldest # truncate_oldest | summarize_more | error
    warn_at_percent: 70                # emit warning when usage exceeds this %

max_iterations: 10

tools: []
skills: []

metadata:
  cli:
    welcome: "=== Token Budget Memory Demo ==="
    hints:
      - "Token budget controls how much memory enters the LLM prompt."
      - "summary gets 1024 tokens, recent_messages gets 2048, facts gets 512."
      - "Total budget: 4096 tokens. Overflow strategy: truncate_oldest."
      - "Warning fires at 70% usage. Have a long conversation to see it in action."