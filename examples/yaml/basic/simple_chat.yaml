name: SimpleChatAgent
version: "1.0.0"
description: "Minimal YAML-first chat agent for ai-agents-cli"

# Simplest possible agent - just a system prompt and an LLM.
#
# Flow: user input -> LLM -> response

system_prompt: |
  You are a friendly, curious, and helpful AI assistant.
  Keep your answers clear, natural, and conversational.

llm:
  provider: openai
  model: gpt-4.1-nano

memory:
  type: in-memory
  max_messages: 50

max_iterations: 10

tools: []
skills: []

metadata:
  cli:
    welcome: "=== Simple Chat YAML Demo ==="
    hints:
      - "Try: Hello!"
      - "Try: What can you help me with?"
      - "Try: Explain Rust ownership simply."