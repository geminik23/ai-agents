name: SimpleChatStreamAgent
version: "1.0.0"
description: "Minimal YAML-first streaming chat agent for ai-agents-cli"

system_prompt: |
  You are a friendly, helpful, and concise AI assistant.
  Keep your answers natural and easy to follow.

llm:
  provider: openai
  model: gpt-4.1-nano

memory:
  type: in-memory
  max_messages: 50

streaming:
  enabled: true

max_iterations: 10

tools: []
skills: []

metadata:
  cli:
    welcome: "=== Simple Chat Streaming YAML Demo ==="
    hints:
      - "Try: Hello!"
      - "Try: Explain ownership in Rust briefly."
      - "Try: Give me 3 tips for learning async Rust."
    streaming: true