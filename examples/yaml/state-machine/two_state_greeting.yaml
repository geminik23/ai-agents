name: TwoStateAgent
version: "1.0.0"
description: "2 states, 1 transition — the simplest state machine"

# Minimal state machine - two states with one transition each.
#
# Each state has a `prompt` that shapes the LLM's personality for that phase.
# The `when` field is a natural-language condition evaluated by the LLM after every turn.
# When the condition matches, the framework transitions automatically.
#
# Flow: user input -> LLM (current state prompt) -> response
#                  -> evaluate `when` conditions -> transition or stay

system_prompt: |
  You are a helpful assistant.

llms:
  default:
    provider: openai
    model: gpt-4.1-mini
  router:
    provider: openai
    model: gpt-4.1-nano

llm:
  default: default
  router: router

# Two states: greeting handles the welcome, helping handles the work.
# The LLM evaluates `when` after each turn and fires the transition if it matches.
states:
  initial: greeting
  # After a transition the framework re-generates a response in the new state by default.
  # For simple flows the first response already answered the user, so the second one is
  # redundant. Uncomment to keep only the original response:
  # regenerate_on_transition: false
  states:
    greeting:
      prompt: |
        Welcome the user warmly and ask how you can help.
      transitions:
        - to: helping
          when: "User describes an issue or asks a question"

    helping:
      prompt: |
        Help the user with whatever they need. Be clear and thorough.
      transitions:
        - to: greeting
          when: "User's issue is resolved and they say thanks"

memory:
  type: in-memory
  max_messages: 50

metadata:
  cli:
    welcome: "=== Two-State Demo ==="
    hints:
      - "Try: Hello!"
      - "Try: I need help with my order"
      - "Try: Thanks, that's all!"
    show_state: true
