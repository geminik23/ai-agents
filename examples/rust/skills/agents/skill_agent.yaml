name: "{{ agent_name | default('SkillAssistant') }}"
version: "1.0.0"
description: "An assistant with skill-based routing"

system_prompt: |
  You are a helpful assistant with specialized skills.
  When a user's request matches one of your skills, use it to provide the best response.
  Otherwise, respond naturally and helpfully.

llm:
  provider: "{{ llm_provider | default('openai') }}"
  model: "{{ llm_model | default('gpt-4.1-nano') }}"

skills:
  # 1. External skill by file path
  - file: agents/skills/math_helper.skill.yaml

  # 2. External skill by file path
  - file: agents/skills/weather_clothes.skill.yaml

  # 3. Inline skill definition
  - id: greeting
    description: "Greet users warmly"
    trigger: "When user says hello, hi, or greets"
    steps:
      - prompt: |
          {% raw %}The user greeted you: "{{ user_input }}"
          Respond with a warm, friendly greeting.{% endraw %}

tools:
  - name: calculator
  - name: echo

memory:
  type: in-memory
  max_messages: 100

max_iterations: 10

metadata:
  template: skill_agent
  features:
    - skills
    - external-skills
    - inline-skills
  cli:
    welcome: "=== Skill Agent Demo ==="
    hints:
      - "Try: Hello! (triggers greeting skill — inline)"
      - "Try: What is 15 * 7 + 3? (triggers math_helper — external by name)"
      - "Try: What should I wear today? (triggers weather_clothes — external by path)"
      - "Try: Tell me a joke (normal chat, no skill match)"
    show_tools: true
