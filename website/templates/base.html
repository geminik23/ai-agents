<!doctype html>
<html lang="en" data-theme="light">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="{{ config.description }}" />
        <meta name="generator" content="Zola" />
        <title>{% block title %}{{ config.title }}{% endblock title %}</title>
        <link rel="stylesheet" href="{{ get_url(path='style.css') }}" />
        <link id="giallo-dark" rel="stylesheet" href="/giallo-dark.css" />
        <link
            id="giallo-light"
            rel="stylesheet"
            href="/giallo-light.css"
            disabled
        />
        <!--<link
            rel="icon"
            href="{{ get_url(path='favicon.svg') }}"
            type="image/svg+xml"
        />-->
    </head>
    <body>
        <!-- ── Header ──────────────────────────────────────────── -->
        <header class="site-header">
            <div class="header-inner container">
                <a
                    href="{{ config.base_url }}"
                    class="site-logo"
                    aria-label="Home"
                >
                    <span class="logo-text">AI Agents</span>
                </a>

                <nav class="site-nav" aria-label="Main navigation">
                    <ul class="nav-links">
                        <li>
                            <a href="{{ get_url(path='@/docs/_index.md') }}"
                                >Docs</a
                            >
                        </li>
                        <li>
                            <a href="{{ get_url(path='@/examples/_index.md') }}"
                                >Examples</a
                            >
                        </li>
                        <li>
                            <a href="{{ get_url(path='@/roadmap.md') }}"
                                >Roadmap</a
                            >
                        </li>
                        <li>
                            <a href="{{ get_url(path='@/blog/_index.md') }}"
                                >Blog</a
                            >
                        </li>
                        <li>
                            <a
                                href="{{ config.extra.github }}"
                                target="_blank"
                                rel="noopener noreferrer"
                                class="nav-github"
                                aria-label="GitHub repository"
                            >
                                <svg
                                    width="20"
                                    height="20"
                                    viewBox="0 0 24 24"
                                    fill="currentColor"
                                    aria-hidden="true"
                                >
                                    <path
                                        d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"
                                    />
                                </svg>
                                <span class="nav-github-label">GitHub</span>
                            </a>
                        </li>
                    </ul>
                </nav>

                <button
                    class="theme-toggle"
                    id="theme-toggle"
                    type="button"
                    aria-label="Toggle dark/light theme"
                    title="Toggle theme"
                >
                    {# Sun icon (shown in dark mode) #}
                    <svg
                        class="icon-sun"
                        width="18"
                        height="18"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        aria-hidden="true"
                    >
                        <circle cx="12" cy="12" r="5" />
                        <line x1="12" y1="1" x2="12" y2="3" />
                        <line x1="12" y1="21" x2="12" y2="23" />
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                        <line x1="1" y1="12" x2="3" y2="12" />
                        <line x1="21" y1="12" x2="23" y2="12" />
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
                    </svg>
                    {# Moon icon (shown in light mode) #}
                    <svg
                        class="icon-moon"
                        width="18"
                        height="18"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        aria-hidden="true"
                    >
                        <path
                            d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"
                        />
                    </svg>
                </button>

                <button
                    class="mobile-menu-toggle"
                    id="mobile-menu-toggle"
                    type="button"
                    aria-label="Open menu"
                    aria-expanded="false"
                >
                    <svg
                        width="22"
                        height="22"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        aria-hidden="true"
                    >
                        <line x1="3" y1="6" x2="21" y2="6" />
                        <line x1="3" y1="12" x2="21" y2="12" />
                        <line x1="3" y1="18" x2="21" y2="18" />
                    </svg>
                </button>
            </div>
        </header>

        <!-- ── Main content ────────────────────────────────────── -->
        <main class="site-main">{% block content %}{% endblock content %}</main>

        <!-- ── Footer ──────────────────────────────────────────── -->
        <footer class="site-footer">
            <div class="footer-inner container">
                <div class="footer-brand">
                    <span class="footer-name">AI Agents Framework</span>
                    <span class="footer-version"
                        >v{{ config.extra.version }}</span
                    >
                </div>

                <div class="footer-license">
                    Licensed under
                    <a
                        href="https://opensource.org/licenses/Apache-2.0"
                        target="_blank"
                        rel="noopener"
                        >Apache-2.0</a
                    >
                    /
                    <a
                        href="https://opensource.org/licenses/MIT"
                        target="_blank"
                        rel="noopener"
                        >MIT</a
                    >
                </div>

                <nav class="footer-links" aria-label="Footer navigation">
                    <a
                        href="{{ config.extra.github }}"
                        target="_blank"
                        rel="noopener noreferrer"
                        >GitHub</a
                    >
                    <a
                        href="{{ config.extra.crates_io }}"
                        target="_blank"
                        rel="noopener noreferrer"
                        >crates.io</a
                    >
                    <a
                        href="{{ config.extra.docs_rs }}"
                        target="_blank"
                        rel="noopener noreferrer"
                        >docs.rs</a
                    >
                </nav>
            </div>
        </footer>

        <!-- ── Theme toggle + mobile menu (inline JS, no external deps) ── -->
        <script>
            (function () {
                var root = document.documentElement;
                var toggle = document.getElementById("theme-toggle");
                var mobileToggle =
                    document.getElementById("mobile-menu-toggle");
                var nav = document.querySelector(".site-nav");
                var STORAGE_KEY = "ai-agents-theme";

                var gialloDark = document.getElementById("giallo-dark");
                var gialloLight = document.getElementById("giallo-light");

                function applyTheme(theme) {
                    root.setAttribute("data-theme", theme);
                    if (gialloDark && gialloLight) {
                        gialloDark.disabled = theme === "light";
                        gialloLight.disabled = theme !== "light";
                    }
                }

                // Restore saved theme or default to dark
                var saved = localStorage.getItem(STORAGE_KEY);
                if (saved === "light" || saved === "dark") {
                    applyTheme(saved);
                }

                toggle.addEventListener("click", function () {
                    var current = root.getAttribute("data-theme") || "dark";
                    var next = current === "dark" ? "light" : "dark";
                    applyTheme(next);
                    localStorage.setItem(STORAGE_KEY, next);
                });

                // Mobile nav toggle
                if (mobileToggle && nav) {
                    mobileToggle.addEventListener("click", function () {
                        var expanded =
                            mobileToggle.getAttribute("aria-expanded") ===
                            "true";
                        mobileToggle.setAttribute(
                            "aria-expanded",
                            String(!expanded),
                        );
                        nav.classList.toggle("is-open");
                    });
                }
            })();
        </script>
    </body>
</html>
